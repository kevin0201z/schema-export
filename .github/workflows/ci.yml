name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  fmt:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26'
    - name: Check formatting
      run: |
        out=$(gofmt -s -l .)
        if [ -n "$out" ]; then
          echo "gofmt found files that need formatting:";
          echo "$out";
          exit 1;
        fi

  vet:
    name: go vet
    runs-on: ubuntu-latest
    needs: fmt
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26'
    - name: Run go vet
      run: go vet ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    needs: vet
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26'
    - name: Restore golangci-lint cache
      uses: actions/cache@v4
      with:
        path: |
          ${{ runner.temp }}/golangci-cache
          ${{ github.workspace }}/pkg/mod
        key: ${{ runner.os }}-golangci-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-golangci-
    - name: Install golangci-lint
      env:
        GOLANGCI_LINT_VERSION: v1.64.8
      run: |
        go install github.com/golangci/golangci-lint/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}
    - name: Run golangci-lint
      env:
        PATH: ${{ env.PATH }}:$(go env GOPATH)/bin
      run: |
        $(go env GOPATH)/bin/golangci-lint run --timeout 5m

  test:
    name: Unit tests (matrix)
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        go-version: [1.25, 1.26]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ matrix.go-version }}
    - name: Cache Go modules
      uses: actions/cache@v4
      with:
        path: |
          ~/.cache/go-build
          ${{ github.workspace }}/pkg/mod
        key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-${{ matrix.go-version }}-
    - name: Download dependencies
      run: go mod download
    - name: Run tests
      run: go test ./...

  build:
    name: Build artifacts
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.26'
    - name: Build
      run: make build || true
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries
        path: build/
